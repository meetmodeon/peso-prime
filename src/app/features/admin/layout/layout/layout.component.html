<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-16 lg:w-72 bg-white dark:bg-slate-900 border-r border-slate-200
                dark:border-slate-800 flex flex-col transition-all duration-300 shrink-0">

    <!-- Logo -->
    <div class="h-20 flex items-center justify-center lg:justify-start lg:px-6 gap-3 border-b border-slate-100">
      <div class="bg-indigo-900 rounded-lg size-10 shrink-0 flex items-center justify-center text-white">
        <img src="logo.jpg" alt="logo" class="size-8 rounded-md" />
      </div>
      <div class="hidden lg:block overflow-hidden">
        <h1 class="font-bold text-indigo-900 dark:text-slate-100 text-lg leading-tight whitespace-nowrap">
          Peso Consultants
        </h1>
        <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">
          Industrial Admin
        </p>
      </div>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 px-2 lg:px-4 py-4 space-y-1 overflow-y-auto">

      <a routerLink="/admin/dashboard"
         routerLinkActive="bg-indigo-900 text-white shadow-lg shadow-indigo-900/20"
         #d="routerLinkActive"
         [ngClass]="{ 'hover:bg-slate-100': !d.isActive }"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-slate-600 dark:text-slate-400 transition-all group"
         title="Dashboard">
        <i class="pi pi-microsoft text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">Dashboard</span>
      </a>

      <a routerLink="/admin/projects"
         routerLinkActive="bg-indigo-900 text-white shadow-lg shadow-indigo-900/20"
         #p="routerLinkActive"
         [ngClass]="{ 'hover:bg-slate-100': !p.isActive }"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-slate-600 dark:text-slate-400 transition-all"
         title="Projects">
        <i class="pi pi-chart-line text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">Projects</span>
      </a>

      <a routerLink="/admin/services"
         routerLinkActive="bg-indigo-900 text-white shadow-lg shadow-indigo-900/20"
         #s="routerLinkActive"
         [ngClass]="{ 'hover:bg-slate-100': !s.isActive }"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-slate-600 dark:text-slate-400 transition-all"
         title="Services">
        <i class="fa-solid fa-server text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">Services</span>
      </a>

      <a routerLink="/admin/teams"
         routerLinkActive="bg-indigo-900 text-white shadow-lg shadow-indigo-900/20"
         #t="routerLinkActive"
         [ngClass]="{ 'hover:bg-slate-100': !t.isActive }"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-slate-600 dark:text-slate-400 transition-all"
         title="Team Members">
        <i class="pi pi-users text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">Team Members</span>
      </a>

      <a routerLink="/admin/clients"
         routerLinkActive="bg-indigo-900 text-white shadow-lg shadow-indigo-900/20"
         #cl="routerLinkActive"
         [ngClass]="{ 'hover:bg-slate-100': !cl.isActive }"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-slate-600 dark:text-slate-400 transition-all"
         title="Our Clients">
        <i class="fa-solid fa-hand-holding-hand text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">Our Clients</span>
      </a>

      <a
      *ngIf="isAdmin()"
       routerLink="/admin/users"
         routerLinkActive="bg-indigo-900 text-white shadow-lg shadow-indigo-900/20"
         #u="routerLinkActive"
         [ngClass]="{ 'hover:bg-slate-100': !u.isActive }"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-slate-600 dark:text-slate-400 transition-all"
         title="Users">
        <i class="pi pi-user text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">Users</span>
      </a>

      <a routerLink="/admin/contacts"
         routerLinkActive="bg-indigo-900 text-white shadow-lg shadow-indigo-900/20"
         #q="routerLinkActive"
         [ngClass]="{ 'hover:bg-slate-100': !q.isActive }"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-slate-600 dark:text-slate-400 transition-all"
         title="All Queries">
        <i class="pi pi-question-circle text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">All Queries</span>
      </a>

    </nav>

    <!-- Bottom -->
    <div class="px-2 lg:px-4 py-4 border-t border-slate-200 flex flex-col gap-1">

      <a 
      *ngIf="isAdmin()"
      routerLink="/admin/settings"
         routerLinkActive="bg-indigo-900 text-white shadow-lg shadow-indigo-900/20"
         #st="routerLinkActive"
         [ngClass]="{ 'hover:bg-slate-100': !st.isActive }"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-slate-600 dark:text-slate-400 transition-all"
         title="Settings">
        <i class="pi pi-cog text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">Settings</span>
      </a>

      <a (click)="logout()"
         class="flex items-center justify-center lg:justify-start gap-3 px-3 py-3
                rounded-xl text-red-500 hover:bg-red-50 bg-red-50/60
                transition-all cursor-pointer"
         title="Logout">
        <i class="pi pi-sign-out text-lg shrink-0"></i>
        <span class="hidden lg:block font-medium whitespace-nowrap">Logout</span>
      </a>

    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-auto bg-gray-100">
    <router-outlet />
  </main>

</div>
