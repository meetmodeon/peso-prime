<div class="min-h-screen bg-slate-50">

  <!-- 🔥 Sticky Header -->
  <header
    class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 h-16 flex items-center justify-between px-8"
  >

    <!-- Left -->
    <div class="flex items-center gap-3">

      <!-- Back -->
      <button
        routerLink="/admin/clients"
        class="w-9 h-9 flex items-center justify-center rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-100 transition cursor-pointer"
      >
        <i class="pi pi-arrow-left text-sm"></i>
      </button>

      <!-- Title -->
      <div>
        <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-indigo-600">
          Client Management
        </p>
        <h1 class="text-base font-extrabold text-slate-900 leading-tight">
          Client Profile
        </h1>
      </div>

    </div>

    <!-- Right Action -->
    <div class="flex items-center gap-2">

      <button
        *ngIf="clientData"
        [routerLink]="['/admin/clients/edit', clientId]"
        class="px-4 py-2 rounded-lg text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 transition flex items-center gap-2 cursor-pointer"
      >
        <i class="pi pi-pencil text-xs"></i>
        Edit
      </button>

    </div>

  </header>

  <!-- 🔄 Loading -->
  <div *ngIf="loading" class="flex justify-center items-center h-64 text-slate-500">
    Loading client details...
  </div>

  <!-- 🧾 Content -->
  <div *ngIf="!loading && clientData" class="max-w-5xl mx-auto p-6 space-y-6">

    <!-- 🪪 Profile Card -->
    <div class="bg-white rounded-2xl shadow-sm border p-6 flex flex-col md:flex-row gap-6 border-gray-500/20">

      <!-- Avatar -->
      <div class="flex flex-col items-center gap-3">
        <img
          *ngIf="clientData.clientImageId"
          [secureImage]="clientData.clientImageId"
          class="w-28 h-28 rounded-full object-cover border"
        />
        <div
          *ngIf="!clientData.clientImageId"
          class="w-28 h-28 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 text-sm"
        >
          No Image
        </div>
      </div>

      <!-- Info -->
      <div class="flex-1 space-y-2">

        <h2 class="text-2xl font-bold text-slate-900">
          {{ clientData.name }}
        </h2>

        <p class="text-slate-600">
          {{ clientData.position }}
        </p>

        <p class="text-sm text-slate-500">
          {{ clientData.companyName }}
        </p>

      </div>

    </div>

    <!-- 📦 Details Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 ">

      <!-- Description -->
      <div class="bg-white border rounded-xl p-5 md:col-span-2 border border-gray-500/20 shadow">
        <p class="text-xs uppercase tracking-wide text-slate-400 mb-2">
          Description
        </p>
        <p class="text-slate-700 leading-relaxed">
          {{ clientData.description }}
        </p>
      </div>

      <!-- Company Logo -->
      <div class="bg-white border rounded-xl p-5 flex items-center gap-4 border-gray-500/20 shadow">

        <div>
          <p class="text-xs uppercase text-slate-400 mb-2">Company Logo</p>

          <img
            *ngIf="clientData.companyLogoId"
            [secureImage]="clientData.companyLogoId"
            class="w-16 h-16 object-cover rounded-lg border"
          />

          <p *ngIf="!clientData.companyLogoId" class="text-slate-400 text-sm">
            No logo available
          </p>
        </div>

      </div>

      <!-- Info Box -->
      <div class="bg-white border rounded-xl p-5 space-y-2 border-gray-500/20 shadow">

        <p class="text-xs uppercase text-slate-400">Status</p>
        <span class="inline-block px-3 py-1 text-xs rounded-full bg-green-100 text-green-700">
          Active
        </span>

      </div>

    </div>

  </div>

  <!-- ❌ Not Found -->
  <div *ngIf="!loading && !clientData" class="text-center text-red-500 mt-10">
    Client not found
  </div>

</div>
