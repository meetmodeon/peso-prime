<section class="py-12 bg-white dark:bg-background-dark/30">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
      <div>
        <h2 class="text-4xl font-bold text-slate-900 dark:text-white mb-4">
          Featured Projects
        </h2>

        <div class="h-1.5 w-24 bg-green-600 rounded-full"></div>

        <p class="text-slate-500 mt-6 max-w-xl">
          Pioneering geotechnical solutions for Nepal's landmark infrastructure and energy developments.
        </p>
      </div>
    </div>

    <!-- PROJECT GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      <div
        *ngFor="let project of homeProject()"
        class="project-card relative overflow-hidden rounded-2xl aspect-4/5 group bg-slate-900"
      >

        <!-- IMAGE -->
        <ng-container *ngIf="project.imageIds?.length > 0; else noImage">
          <img
            [secureImage]="project.imageIds[0]"
            class="absolute inset-0 w-full h-full object-cover opacity-60 transition-transform duration-700 group-hover:scale-110"
          />
        </ng-container>

        <ng-template #noImage>
          <div class="absolute inset-0 flex items-center justify-center bg-slate-100">
            <i class="pi pi-image text-4xl text-slate-400"></i>
          </div>
        </ng-template>

        <!-- OVERLAY -->
        <div class="absolute inset-0 bg-linear-to-t from-black via-black/20 to-transparent"></div>

        <!-- CONTENT -->
        <div class="absolute bottom-0 left-0 p-8 w-full">

          <span class="text-green-600 font-bold text-xs uppercase tracking-widest mb-2 block">
            {{ project.categoryTags }}
          </span>

          <h3 class="text-2xl font-bold text-white mb-2">
            {{ project.title }}
          </h3>

          <p class="text-white/70 text-sm mb-6 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            {{ project.description }}
          </p>

          <div class="flex items-center gap-4">
            <span class="text-white/40 text-xs flex items-center gap-1">
              <i class="pi pi-map-marker text-sm"></i>
              {{ project.location }}
            </span>
          </div>

        </div>

      </div>

    </div>

  </div>

</section>
